<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>

<style>

:root{
--accent:#e63946;
--fade:.2;
}

/* BACKGROUND */

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:"Courier New",monospace;
overflow:hidden;

background:linear-gradient(120deg,#ffffff,#fff6f6,#ffffff);
background-size:200% 200%;

animation:bgMove 18s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* MAIN */

#main{
width:90%;
max-width:520px;
text-align:center;
transition:transform 2s ease;
}

.zoom{
transform:scale(1.05);
}

/* QUESTION */

#question{
transition:.8s ease;
}

#question.hide{
opacity:0;
transform:scale(.9);
}

#answer{
border:none;
border-bottom:2px solid black;
font-size:3rem;
width:80px;
text-align:center;
background:transparent;
outline:none;
margin-top:20px;
}

/* SCROLL TEXT */

#scroll{
display:none;
height:160px;
overflow:hidden;
position:relative;
}

.line{
position:absolute;
width:100%;
font-size:1.6rem;

opacity:0;
transform:translateY(60px);

transition:
transform 1s cubic-bezier(.22,.68,0,1),
opacity 1s ease;
}

.line.active{
opacity:1;
transform:translateY(0);
}

.line.old{
opacity:var(--fade);
transform:translateY(-60px);
font-size:1.2rem;
}

/* LETTER */

#letter{
display:none;
text-align:left;
padding:30px;
border-radius:12px;
background:white;

box-shadow:0 20px 50px rgba(0,0,0,.08);

opacity:0;
transform:translateY(20px) scale(.96);

animation:letterIn 1.6s ease forwards;
}

@keyframes letterIn{
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

h2{
color:var(--accent);
text-align:center;
}

/* HEARTS */

#hearts{
position:fixed;
bottom:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.heart{
position:absolute;
bottom:-20px;
font-size:22px;
color:#e63946;

animation:floatUp linear forwards;
}

@keyframes floatUp{

0%{
transform:translateY(0) scale(.6);
opacity:0;
}

10%{
opacity:1;
}

100%{
transform:translateY(-110vh) scale(1.3);
opacity:0;
}

}

</style>
</head>

<body>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div id="main">

<div id="question">
<h1>2 + 2 = ?</h1>
<input id="answer" type="number" autofocus>
</div>

<div id="scroll">

<div class="line" id="line0"></div>
<div class="line" id="line1">I like you,</div>
<div class="line" id="line2">I love you,</div>
<div class="line" id="line3">and in your heart, you are beautiful.</div>

</div>

<div id="letter">

<h2>Our First Year</h2>

<p id="letterText"></p>

</div>

</div>

<div id="hearts"></div>

<script>

const answer=document.getElementById("answer")
const question=document.getElementById("question")
const scroll=document.getElementById("scroll")
const letter=document.getElementById("letter")
const music=document.getElementById("music")
const main=document.getElementById("main")

const lines=[
document.getElementById("line0"),
document.getElementById("line1"),
document.getElementById("line2"),
document.getElementById("line3")
]

const letterText=document.getElementById("letterText")

const fullLetter=`To my Highness,

I was just thinking about us and wanted to tell you how much I truly love you.

I know this year wasn't always perfect and we definitely had some moments that weren't great, but honestly, that didn't change anything for me. If anything, it just made me realize how much I don't ever want to lose you.

Going through the ups and downs actually made me love you even more, and I feel like that love just keeps growing every single day.

You make everything so much lovelier just by being in my life. I’m so happy I have you.

Forever yours.`

answer.addEventListener("input",()=>{
if(answer.value==="4") start()
})

function sleep(ms){
return new Promise(r=>setTimeout(r,ms))
}

/* TYPEWRITER FOR INTRO */

async function typeText(el,text,speed=60){

el.classList.add("active")

for(let i=0;i<text.length;i++){
el.textContent+=text[i]
await sleep(speed)
}

}

/* TYPEWRITER LETTER */

async function typeLetter(text){

for(let i=0;i<text.length;i++){

letterText.textContent+=text[i]

await sleep(35)

}

}

/* HEART PARTICLES */

function startHearts(){

const container=document.getElementById("hearts")

setInterval(()=>{

const heart=document.createElement("div")

heart.className="heart"

heart.innerHTML="❤"

heart.style.left=Math.random()*100+"%"
heart.style.fontSize=(18+Math.random()*20)+"px"
heart.style.animationDuration=(6+Math.random()*5)+"s"

container.appendChild(heart)

setTimeout(()=>{
heart.remove()
},10000)

},400)

}

/* MUSIC FADE IN */

function fadeMusic(){

music.volume=0
music.play().catch(()=>{})

let v=0

const interval=setInterval(()=>{

v+=0.05

if(v>=1){
music.volume=1
clearInterval(interval)
}

music.volume=v

},300)

}

/* MAIN ANIMATION */

async function start(){

fadeMusic()

question.classList.add("hide")

await sleep(800)

scroll.style.display="block"

await typeText(lines[0],"Oh wait, four letters in Chinese...")

await sleep(1500)

lines[0].classList.add("old")

for(let i=1;i<lines.length;i++){

lines[i].classList.add("active")

await sleep(2200)

lines[i].classList.add("old")

}

await sleep(1200)

scroll.style.opacity="0"

await sleep(900)

scroll.style.display="none"

letter.style.display="block"

main.classList.add("zoom")

startHearts()

await sleep(800)

typeLetter(fullLetter)

}

</script>

</body>
</html>
